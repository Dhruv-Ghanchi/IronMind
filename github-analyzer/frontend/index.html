<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyglot Analyzer — Understand Any Codebase</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo"><b>Polyglot</b> <span>Analyzer</span></div>
        <div class="nav-links">
            <a href="https://github.com" target="_blank">View on GitHub</a>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Understand any codebase instantly</h1>
            <p>Paste a GitHub URL. We map every dependency, predict every risk, and fix it with one click.</p>
        </section>

        <section class="input-container">
            <div class="search-box">
                <input type="text" id="githubUrl" placeholder="https://github.com/owner/repository" onkeypress="handleEnter(event)">
                <button onclick="analyzeRepo()">Analyze</button>
            </div>
            
            <div class="examples">
                <span>Try:</span>
                <div class="pill" onclick="setExample('tiangolo/fastapi')">tiangolo/fastapi</div>
            </div>
            <p style="font-size:0.78rem; color:#8b949e; margin-top:0.75rem;">💡 PR creation works on repositories you own.</p>

            <div id="errorBox"></div>
        </section>
    </main>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="statusText">Connecting to GitHub...</div>
    </div>

    <script>
        function setExample(repo) {
            document.getElementById('githubUrl').value = `https://github.com/${repo}`;
            analyzeRepo();
        }

        function handleEnter(e) {
            if (e.key === 'Enter') analyzeRepo();
        }

        function showLoading() {
            const overlay = document.getElementById('loadingOverlay');
            const status = document.getElementById('statusText');
            overlay.style.display = 'flex';
            
            const steps = [
                "Fetching repository structure...",
                "Downloading files in parallel...",
                "Analyzing dependencies...",
                "Rendering graph..."
            ];
            
            let currentStep = 0;
            const interval = setInterval(() => {
                currentStep++;
                if (currentStep < steps.length) {
                    status.innerText = steps[currentStep];
                } else {
                    clearInterval(interval);
                }
            }, 2500);
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        function showError(msg) {
            const box = document.getElementById('errorBox');
            box.innerText = msg;
            box.style.display = 'block';
        }

        async function analyzeRepo() {
            const urlInput = document.getElementById('githubUrl');
            const url = urlInput.value.trim();
            const errorBox = document.getElementById('errorBox');
            
            if (!url) return;
            errorBox.style.display = 'none';
            
            showLoading();
            
            try {
                const res = await fetch('http://localhost:8000/api/analyze-github', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ github_url: url })
                });
                
                if (!res.ok) {
                    if (res.status === 403) {
                        throw new Error('GitHub API rate limit reached. Add GITHUB_TOKEN to backend .env to increase limits.');
                    }
                    const err = await res.json();
                    throw new Error(err.detail || 'Analysis failed');
                }
                
                const data = await res.json();
                
                // Store in sessionStorage for graph page
                sessionStorage.setItem('graphData', JSON.stringify(data));
                
                // Redirect to graph page
                window.location.href = 'graph.html';
                
            } catch(e) {
                hideLoading();
                showError(e.message);
            }
        }
    </script>
</body>
</html>
