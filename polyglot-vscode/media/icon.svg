<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" 
     fill="none" stroke="currentColor" stroke-width="1.5"
     stroke-linecap="round" stroke-linejoin="round">
  <!-- Database cylinder -->
  <ellipse cx="3" cy="6" rx="2" ry="1"/>
  <rect x="1" y="6" width="4" height="3" fill="none"/>
  <ellipse cx="3" cy="9" rx="2" ry="1"/>
  <!-- Arrow 1 -->
  <line x1="5" y1="7.5" x2="8" y2="7.5"/>
  <polyline points="7,6.5 8,7.5 7,8.5"/>
  <!-- Backend box -->
  <rect x="8" y="5.5" width="4" height="4" rx="0.5"/>
  <!-- Arrow 2 -->
  <line x1="12" y1="7.5" x2="15" y2="7.5"/>
  <polyline points="14,6.5 15,7.5 14,8.5"/>
  <!-- API diamond -->
  <polygon points="17,5.5 19,7.5 17,9.5 15,7.5"/>
  <!-- Arrow 3 -->
  <line x1="19" y1="7.5" x2="22" y2="7.5"/>
  <polyline points="21,6.5 22,7.5 21,8.5"/>
  <!-- Frontend component -->  
  <rect x="22" y="5.5" width="1" height="4" rx="0.5"/>
</svg>
